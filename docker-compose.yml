services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - data:/app/data
    env_file:
      - .env
    environment:
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      DEBUG: ${DEBUG:-false}
    init: true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

volumes:
  uploads:
    driver: local
  data:
    driver: local
